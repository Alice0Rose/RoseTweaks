 rose_choose_starting_ruler_ethic.2.d: "Focus on how we view other lifeforms."
 rose_choose_starting_ruler_ethic.2.e: "Focus on how we conserve or exploit nature."
 rose_choose_starting_ruler_ethic.2.f: "Focus on how we manage our economy."
 
