 trade_policy_mutual_aid_food_desc: "By reinvesting our surplus back into the cooperative, we ensure that all our members may thrive according to their needs and shared aspirations.\n\n§Y75%§! of our collected $r_trade$ earns us $r_energy$, $r_food$, and $r_unity$. Every £trade£ §Y1§! earns us £energy£ §Y0.4§!, £food£ §Y0.4§!, and £unity£ §Y0.1§!."
 
