 rose_l_cluster_lockdown.4.name: "L-Cluster Locked Down"
 rose_l_cluster_lockdown.4.desc: "We have received word that the §Y[from.GetName]§! has initiated a remote self-destruct of all L-Gates save for one. This will make accessing the L-Cluster much more difficult going forward."
