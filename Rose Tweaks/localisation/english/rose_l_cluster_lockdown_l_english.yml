l_english:
 ROSE_L_CLUSTER_LOCKDOWN: "Lock Down L-Cluster"
 ROSE_L_CLUSTER_LOCKDOWN_DESC: "With control over Terminal Egress, our scientists believe they have found a way to force all other L-Gates, save for one, to self-destruct. This would make the L-Cluster significantly easier to fortify by limiting the routes our enemies have to access it."

 rose_l_cluster_lockdown.1.name: "$ROSE_L_CLUSTER_LOCKDOWN$"
